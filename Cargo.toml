[package]
name = "wallpaper-rs"
version = "26.3.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
image = { version = "0.25.10", default-features = false, features = ["jpeg", "png"] }
serde = { version = "1.0.228", features = ["derive"] }
smithay-client-toolkit = "0.20.0"
toml = "1.1.2"
tracing = { version = "0.1.44", default-features = false, features = ["tracing-attributes"] }
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["ansi"] }
wayland-client = "0.31.14"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
