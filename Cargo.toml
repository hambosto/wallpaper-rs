[package]
name = "wallpaper-rs"
version = "26.3.0"
edition = "2024"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[dependencies]
anyhow = "1.0.102"
env_logger = { version = "0.11.9", default-features = false, features = ["auto-color", "humantime"] }
image = { version = "0.25.9", default-features = false, features = ["jpeg", "png"] }
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
smithay-client-toolkit = "0.20.0"
toml = "1.0.3"
wayland-client = "0.31.12"
