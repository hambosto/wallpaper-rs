name: Update Flake Dependencies

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix package manager
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake.lock file
        id: update
        uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        if: steps.update.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ steps.update.outputs.pull-request-number }}

      - name: Build and push artifacts to Cachix cache
        if: steps.update.outputs.pull-request-number != ''
        run: nix build --no-link --print-out-paths .#default | cachix push ${{ secrets.CACHIX_CACHE_NAME }}

      - name: Auto-merge dependency update PR
        if: ${{ steps.update.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.update.outputs.pull-request-number }} --squash --delete-branch
